[project]
name = "agentloop_sdk"
version = "0.5.2"
description = "SDK for the Alibaba CLoud AgentLoop platform. https://cmsnext.console.aliyun.com/agentloop"
authors = [
    { name = "Alibaba Cloud CMS" }
]
requires-python = ">=3.10"
dependencies = [
    "agentscope",
    "aliyun-log-python-sdk",
    "opentelemetry-api",
    "darabonba-core>=1.0.0,<2.0.0",
    "alibabacloud-tea-openapi>=0.4.4,<1.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentloop_sdk"]
